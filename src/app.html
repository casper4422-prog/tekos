<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>⬡</text></svg>" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#00b4ff" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="TekOS" />
		<title>⬡ TekOS — Specimen Management Network</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
		<link rel="stylesheet" href="/tekos.css" />
		<link rel="manifest" href="/manifest.json" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<canvas id="tekHexCanvas"></canvas>
		<script>
			(function () {
				const canvas = document.getElementById('tekHexCanvas');
				if (!canvas) return;
				const ctx = canvas.getContext('2d');
				const R = 32;
				const W = R * Math.sqrt(3);
				const H = R * 2;
				let phase = 0;
				let raf;
				function drawHex(x, y, opacity) {
					ctx.beginPath();
					for (let i = 0; i < 6; i++) {
						const a = (Math.PI / 3) * i - Math.PI / 6;
						const px = x + (R - 1) * Math.cos(a);
						const py = y + (R - 1) * Math.sin(a);
						i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
					}
					ctx.closePath();
					ctx.strokeStyle = `rgba(0,180,255,${opacity})`;
					ctx.lineWidth = 1;
					ctx.stroke();
				}
				function draw() {
					ctx.clearRect(0, 0, canvas.width, canvas.height);
					const cw = canvas.width,
						ch = canvas.height;
					const cols = Math.ceil(cw / W) + 3;
					const rows = Math.ceil(ch / (H * 0.75)) + 3;
					for (let row = -1; row < rows; row++) {
						for (let col = -1; col < cols; col++) {
							const x = col * W + (row % 2 !== 0 ? W / 2 : 0);
							const y = row * H * 0.75;
							const dx = x - cw * 0.5,
								dy = y - ch * 0.5;
							const dist = Math.sqrt(dx * dx + dy * dy);
							const wave = Math.sin(phase - dist * 0.01) * 0.5 + 0.5;
							const opacity = 0.07 + wave * 0.09;
							drawHex(x, y, opacity);
						}
					}
					phase += 0.005;
					raf = requestAnimationFrame(draw);
				}
				function resize() {
					canvas.width = window.innerWidth;
					canvas.height = window.innerHeight;
				}
				window.addEventListener('resize', resize);
				resize();
				draw();
				document.addEventListener('visibilitychange', () => {
					if (document.hidden) cancelAnimationFrame(raf);
					else draw();
				});
			})();
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
